# PRD-017 §8.1 — Source → unified class mapping.
# Used by ai-service/scripts/merge_datasets.py (BL-262).
#
# IDs must match the target classes in ai-service/config.yaml so the
# merged data.yaml stays compatible with the downstream YOLOv8 trainer.

target_classes:
  0: earbuds
  1: phone
  2: book
  3: paper_notes
  4: smart_watch       # Sprint 15
  5: pencil_case       # Sprint 16
  6: calculator        # Sprint 16

source_mappings:
  # Sprint 16 — pencil case
  oid_pencil_case:
    "Pencil case": 5
  roboflow_pencil_case:
    "pencil_case":   5
    "pencil-case":   5

  # Sprint 16 — calculator
  oid_calculator:
    "Calculator": 6
  roboflow_calculator:
    "calculator": 6

  # Sprint 16 — cheat-sheets / hidden notes → paper_notes
  roboflow_cheat_sheets:
    "cheat_sheet":   3
    "cheat-sheet":   3
    "hidden_notes":  3
    "notes":         3
  roboflow_hidden_notes:
    "hidden_notes":  3
    "notes":         3


  # Roboflow Universe earbuds variants.
  roboflow_earbuds:
    "earbuds":          0
    "earbud":           0
    "airpods":          0
    "wireless_earbuds": 0
    "in_ear":           0

  # Open Images V7 — note the "Headphones" caveat in PRD-017 §8.1.
  # OID Headphones includes over-ear; in-ear filtering happens during §6.2 review.
  open_images:
    "Headphones":  0
    "Mobile phone": 1
    "Book":        2

  # COCO 2017 subset — class IDs 67 (cell phone) and 73 (book).
  coco_subset:
    "cell phone": 1
    "book":       2

  # Internal anonymized frames exported from real exams (PRD-017 §18.3).
  internal:
    "phone":       1
    "earbuds":     0
    "notes":       3
    "cheat_sheet": 3
    "paper_notes": 3


# Sprint 19 — YOLO-World (zero-shot) prompt list.
#
# `prompts` is fed straight to `model.set_classes(...)` so each entry
# becomes a queryable class. Multiple prompts per target are fine — the
# `aliases` block below maps every raw prompt string back to the canonical
# target name the scoring rules look for (`earbuds`, `paper_notes`, …).
#
# Keep one canonical name per target. To add a new class, append a target
# block + alias entries. No retraining required.
world_prompts:
  targets:
    - canonical: person
      prompts:
        - "person"
    - canonical: cell phone
      prompts:
        - "cell phone"
        - "smartphone"
        - "mobile phone in hand"
    - canonical: book
      prompts:
        - "book"
        - "open book on desk"
    - canonical: earbuds
      prompts:
        - "earbuds in ear"
        - "wireless earphone in ear"
        - "airpods in ear"
    - canonical: paper_notes
      prompts:
        - "paper sheet with handwritten notes"
        - "handwritten cheat sheet on desk"
        - "folded note in hand"
    - canonical: smart_watch
      prompts:
        - "smart watch on wrist"
        - "wristwatch on wrist"
    - canonical: pencil_case
      prompts:
        - "pencil case on desk"
    - canonical: calculator
      prompts:
        - "calculator"
        - "scientific calculator on desk"
    - canonical: face_covering
      prompts:
        - "face mask covering mouth and nose"
        - "surgical mask on face"

  # Raw prompt string → canonical name. Filled automatically from the
  # targets[] list above by the loader (every prompt under a canonical
  # block aliases back to that canonical name). Listed here explicitly
  # so the YAML is the single source of truth — no Python-side magic.
  aliases:
    "person":                              person
    "cell phone":                          cell phone
    "smartphone":                          cell phone
    "mobile phone in hand":                cell phone
    "book":                                book
    "open book on desk":                   book
    "earbuds in ear":                      earbuds
    "wireless earphone in ear":            earbuds
    "airpods in ear":                      earbuds
    "paper sheet with handwritten notes":  paper_notes
    "handwritten cheat sheet on desk":     paper_notes
    "folded note in hand":                 paper_notes
    "smart watch on wrist":                smart_watch
    "wristwatch on wrist":                 smart_watch
    "pencil case on desk":                 pencil_case
    "calculator":                          calculator
    "scientific calculator on desk":       calculator
    "face mask covering mouth and nose":   face_covering
    "surgical mask on face":               face_covering
