# Phase A defaults — extend in later phases (PRD-013 §12.1)
service:
  name: horus-eye-ai

ingestion:
  rtsp_buffer_frames: 2
  target_fps: 5

websocket:
  heartbeat_interval_sec: 30

# BL-42 — YOLOv8n COCO pre-trained inference
detection:
  model_path: models/yolov8n.pt    # auto-downloaded on first use if missing
  confidence_threshold: 0.45
  iou_threshold: 0.50
  device: cpu                       # 'cpu' | 'cuda:0' | 'mps'
  # COCO class IDs we care about for proctoring (Phase A subset)
  # 0=person, 67=cell phone, 63=laptop, 73=book, 76=keyboard
  classes_of_interest: [0, 63, 67, 73, 76]
  # Map COCO class name → our IncidentType (when severity rule fires)
  incident_class_map:
    'cell phone': phone_detected
    'laptop':     paper_detected
    'book':       paper_detected
    'keyboard':   paper_detected

# BL-188 / BL-201 — rule-engine thresholds.
# Each knob can be overridden at runtime via the matching ENV var below
# (env wins over file). PRD-013 §7.3 Phase A scoring table.
scoring:
  phone_in_hand:
    overlap_threshold: 0.30        # ENV: PHONE_OVERLAP_THRESHOLD
    sustained_seconds: 3.0         # ENV: PHONE_DWELL_SECONDS  — TIER-1 dwell
    cooldown_seconds:  30.0        # ENV: PHONE_COOLDOWN_SECONDS
    high_severity_conf: 0.65       # ENV: PHONE_HIGH_CONF
    medium_severity_conf: 0.50     # ENV: PHONE_MEDIUM_CONF
  gaze_diversion:
    yaw_threshold:       30.0      # ENV: YAW_THRESHOLD
    sustained_seconds:    3.0      # ENV: GAZE_DWELL_SECONDS
    glance_cooldown_s:   30.0      # ENV: GAZE_GLANCE_COOLDOWN_S
    incident_cooldown_s: 60.0      # ENV: GAZE_INCIDENT_COOLDOWN_S
    fires_window_s:     300.0      # ENV: GAZE_FIRES_WINDOW_S
    fires_for_medium:    3         # ENV: GAZE_FIRES_FOR_MEDIUM
    fires_for_high:      6         # ENV: GAZE_FIRES_FOR_HIGH
  head_turn:
    yaw_threshold:      45.0       # ENV: HEAD_TURN_YAW_THRESHOLD
    sustained_seconds:   2.0       # ENV: HEAD_TURN_DWELL_SECONDS
    cooldown_seconds:   30.0       # ENV: HEAD_TURN_COOLDOWN_S
    fires_window_s:    300.0       # ENV: HEAD_TURN_FIRES_WINDOW_S
    fires_for_combo:     3         # ENV: HEAD_TURN_FIRES_FOR_COMBO
