name: Deploy — Production

on:
  push:
    branches: [main]

defaults:
  run:
    working-directory: portal

jobs:
  deploy-production:
    name: Deploy to Vercel (production)
    runs-on: ubuntu-latest
    environment: production   # requires manual approval in GitHub
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.PROD_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PROD_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.PROD_SUPABASE_SERVICE_ROLE_KEY }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
      NEXT_PUBLIC_ENV: production
      NEXT_PUBLIC_CAMERA_MODULE_ENABLED: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: portal/package-lock.json

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply DB migrations to production
        run: |
          supabase link --project-ref ${{ secrets.PROD_PROJECT_ID }}
          supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.PROD_DB_PASSWORD }}

      - run: npm ci
      - run: npm run build

      - name: Deploy to Vercel (production)
        run: npx vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}
