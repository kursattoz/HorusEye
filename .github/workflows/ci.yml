name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

defaults:
  run:
    working-directory: portal

jobs:
  # ── 0. Security gate — block secrets & dangerous files ──────────────────
  security:
    name: Security Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine diff base
        id: base
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "ref=origin/${{ github.base_ref }}" >> $GITHUB_OUTPUT
          elif git rev-parse HEAD~1 >/dev/null 2>&1; then
            echo "ref=HEAD~1" >> $GITHUB_OUTPUT
          else
            echo "ref=$(git hash-object -t tree /dev/null)" >> $GITHUB_OUTPUT
          fi

      - name: Block committed secrets & credentials
        run: |
          FORBIDDEN_PATTERNS=(
            '\.env\.local$'
            '\.env\.production$'
            '\.env\.staging$'
            '\.pem$'
            '\.key$'
            '\.p12$'
            '\.pfx$'
            'credentials\.json$'
            'service-account.*\.json$'
            '\.credentials$'
          )
          FOUND=0
          for pattern in "${FORBIDDEN_PATTERNS[@]}"; do
            MATCHES=$(git diff --name-only ${{ steps.base.outputs.ref }}...HEAD | grep -E "$pattern" || true)
            if [ -n "$MATCHES" ]; then
              echo "::error::Forbidden file committed: $MATCHES"
              FOUND=1
            fi
          done
          if [ "$FOUND" -eq 1 ]; then
            echo "::error::Remove secret/credential files before merging."
            exit 1
          fi

      - name: Scan for hardcoded secrets in code
        run: |
          HITS=$(git diff ${{ steps.base.outputs.ref }}...HEAD -U0 -- '*.ts' '*.tsx' '*.js' '*.json' '*.yml' '*.yaml' \
            | grep -E '(SUPABASE_SERVICE_ROLE_KEY|SENTRY_AUTH_TOKEN|AWS_SECRET_ACCESS_KEY|private_key)\s*[:=]\s*["'"'"'][A-Za-z0-9+/=_-]{20,}' || true)
          if [ -n "$HITS" ]; then
            echo "::error::Possible hardcoded secret detected in diff:"
            echo "$HITS"
            exit 1
          fi
          echo "No hardcoded secrets found."

      - name: Block large files (>5MB)
        run: |
          LARGE=$(git diff --name-only ${{ steps.base.outputs.ref }}...HEAD | while read f; do
            if [ -f "$f" ]; then
              SIZE=$(stat -c%s "$f" 2>/dev/null || echo 0)
              if [ "$SIZE" -gt 5242880 ]; then echo "$f ($((SIZE/1024/1024))MB)"; fi
            fi
          done)
          if [ -n "$LARGE" ]; then
            echo "::error::Files over 5MB detected: $LARGE"
            exit 1
          fi

  # ── 1. PRD interface version guard ────────────────────────────────────────
  validate:
    name: Validate PRDs
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/validate-prd-interfaces.js

  # ── 1b. Env var wiring guard ─────────────────────────────────────────────
  env-check:
    name: Env Var Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/check-env-vars.sh

  # ── 2. Code quality ────────────────────────────────────────────────────────
  lint-typecheck:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    needs: [security, validate, env-check]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: portal/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run type-check

  # ── 3. Unit + integration tests (Vitest, real local Supabase) ─────────────
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: portal/package-lock.json

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase
        run: supabase start
        working-directory: portal

      - name: Apply migrations + seed data
        run: supabase db reset
        working-directory: portal

      - name: Lint SQL migrations
        run: supabase db lint
        working-directory: portal

      - name: Export local Supabase env vars
        run: |
          STATUS=$(supabase status --output json)
          echo "NEXT_PUBLIC_SUPABASE_URL=$(echo $STATUS | node -pe 'JSON.parse(require("fs").readFileSync("/dev/stdin","utf8")).API_URL')" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$(echo $STATUS | node -pe 'JSON.parse(require("fs").readFileSync("/dev/stdin","utf8")).ANON_KEY')" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_ROLE_KEY=$(echo $STATUS | node -pe 'JSON.parse(require("fs").readFileSync("/dev/stdin","utf8")).SERVICE_ROLE_KEY')" >> $GITHUB_ENV
        working-directory: portal

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage
        env:
          NEXT_PUBLIC_ENV: local
          NEXT_PUBLIC_CAMERA_MODULE_ENABLED: false

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: portal/coverage/

  # ── 4. E2E tests (Playwright, Chromium) ───────────────────────────────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: portal/package-lock.json

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase
        run: supabase start
        working-directory: portal

      - name: Apply migrations + seed data
        run: supabase db reset
        working-directory: portal

      - name: Export local Supabase env vars
        run: |
          STATUS=$(supabase status --output json)
          echo "NEXT_PUBLIC_SUPABASE_URL=$(echo $STATUS | node -pe 'JSON.parse(require("fs").readFileSync("/dev/stdin","utf8")).API_URL')" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$(echo $STATUS | node -pe 'JSON.parse(require("fs").readFileSync("/dev/stdin","utf8")).ANON_KEY')" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_ROLE_KEY=$(echo $STATUS | node -pe 'JSON.parse(require("fs").readFileSync("/dev/stdin","utf8")).SERVICE_ROLE_KEY')" >> $GITHUB_ENV
        working-directory: portal

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          NEXT_PUBLIC_ENV: local
          NEXT_PUBLIC_CAMERA_MODULE_ENABLED: false
          PLAYWRIGHT_BASE_URL: http://localhost:3000

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: portal/playwright-report/

  # ── 5. Build check ─────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test, e2e]
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_ENV: staging
      NEXT_PUBLIC_CAMERA_MODULE_ENABLED: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: portal/package-lock.json
      - run: npm ci
      - run: npm run build
