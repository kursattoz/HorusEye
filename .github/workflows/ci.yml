name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

defaults:
  run:
    working-directory: portal

jobs:
  # ── 1. PRD interface version guard ────────────────────────────────────────
  validate:
    name: Validate PRDs
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/validate-prd-interfaces.js

  # ── 2. Code quality ────────────────────────────────────────────────────────
  lint-typecheck:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: portal/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run type-check

  # ── 3. Unit + integration tests (Vitest, real local Supabase) ─────────────
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: portal/package-lock.json

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase
        run: supabase start
        working-directory: portal

      - name: Apply migrations + seed data
        run: supabase db reset
        working-directory: portal

      - name: Lint SQL migrations
        run: supabase db lint
        working-directory: portal

      - name: Export local Supabase env vars
        run: |
          STATUS=$(supabase status --output json)
          echo "NEXT_PUBLIC_SUPABASE_URL=$(echo $STATUS | node -pe 'JSON.parse(require("fs").readFileSync("/dev/stdin","utf8")).API_URL')" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$(echo $STATUS | node -pe 'JSON.parse(require("fs").readFileSync("/dev/stdin","utf8")).ANON_KEY')" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_ROLE_KEY=$(echo $STATUS | node -pe 'JSON.parse(require("fs").readFileSync("/dev/stdin","utf8")).SERVICE_ROLE_KEY')" >> $GITHUB_ENV
        working-directory: portal

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage
        env:
          NEXT_PUBLIC_ENV: local
          NEXT_PUBLIC_CAMERA_MODULE_ENABLED: false

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: portal/coverage/

  # ── 4. E2E tests (Playwright, Chromium) ───────────────────────────────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: portal/package-lock.json

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase
        run: supabase start
        working-directory: portal

      - name: Apply migrations + seed data
        run: supabase db reset
        working-directory: portal

      - name: Export local Supabase env vars
        run: |
          STATUS=$(supabase status --output json)
          echo "NEXT_PUBLIC_SUPABASE_URL=$(echo $STATUS | node -pe 'JSON.parse(require("fs").readFileSync("/dev/stdin","utf8")).API_URL')" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$(echo $STATUS | node -pe 'JSON.parse(require("fs").readFileSync("/dev/stdin","utf8")).ANON_KEY')" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_ROLE_KEY=$(echo $STATUS | node -pe 'JSON.parse(require("fs").readFileSync("/dev/stdin","utf8")).SERVICE_ROLE_KEY')" >> $GITHUB_ENV
        working-directory: portal

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          NEXT_PUBLIC_ENV: local
          NEXT_PUBLIC_CAMERA_MODULE_ENABLED: false
          PLAYWRIGHT_BASE_URL: http://localhost:3000

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: portal/playwright-report/

  # ── 5. Build check ─────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test, e2e]
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_ENV: staging
      NEXT_PUBLIC_CAMERA_MODULE_ENABLED: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: portal/package-lock.json
      - run: npm ci
      - run: npm run build
