name: Deploy — Staging

on:
  push:
    branches: [develop]

defaults:
  run:
    working-directory: portal

jobs:
  deploy-staging:
    name: Deploy to Vercel (staging)
    runs-on: ubuntu-latest
    environment: staging
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.STAGING_SUPABASE_SERVICE_ROLE_KEY }}
      NEXT_PUBLIC_ENV: staging
      NEXT_PUBLIC_CAMERA_MODULE_ENABLED: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: portal/package-lock.json

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply DB migrations to staging
        run: |
          supabase link --project-ref ${{ secrets.STAGING_PROJECT_ID }}
          supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.STAGING_DB_PASSWORD }}

      - run: npm ci
      - run: npm run build

      - name: Deploy to Vercel
        run: npx vercel deploy --token=${{ secrets.VERCEL_TOKEN }} --env NEXT_PUBLIC_ENV=staging
