name: Deploy — Staging

on:
  push:
    branches: [develop]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-1
  ECR_REPO: horuseye/portal
  CDK_STACK: HorusEye-Staging

jobs:
  deploy-staging:
    name: Build & Deploy to AWS (staging)
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      # ── Supabase migrations ────────────────────────────────────
      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply DB migrations to staging
        working-directory: portal
        run: |
          supabase link --project-ref ${{ secrets.STAGING_PROJECT_ID }} -p "${{ secrets.STAGING_DB_PASSWORD }}"
          supabase db push -p "${{ secrets.STAGING_DB_PASSWORD }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.STAGING_DB_PASSWORD }}

      # ── AWS auth (OIDC) ────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # ── Docker build & push ────────────────────────────────────
      - name: Build and push Docker image
        working-directory: portal
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_SUPABASE_URL=${{ secrets.STAGING_SUPABASE_URL }} \
            --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.STAGING_SUPABASE_ANON_KEY }} \
            --build-arg NEXT_PUBLIC_ENV=staging \
            --build-arg NEXT_PUBLIC_CAMERA_MODULE_ENABLED=false \
            -t $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPO:latest \
            .
          docker push $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPO:latest

      # ── Note: CDK infra (Lambda, EventBridge) is deployed manually ──
      # Run `cd infra && npx cdk deploy --all` locally when infra changes.
      # Pipeline IAM role lacks CDK bootstrap bucket write access.

      # ── ECS deploy ─────────────────────────────────────────────
      - name: Resolve ECS names from CDK stack outputs
        id: ecs
        run: |
          CLUSTER=$(aws cloudformation describe-stacks --stack-name $CDK_STACK \
            --query "Stacks[0].Outputs[?OutputKey=='ClusterArn'].OutputValue" --output text)
          SERVICE=$(aws cloudformation describe-stacks --stack-name $CDK_STACK \
            --query "Stacks[0].Outputs[?OutputKey=='ServiceArn'].OutputValue" --output text)
          echo "cluster=$CLUSTER" >> $GITHUB_OUTPUT
          echo "service=$SERVICE" >> $GITHUB_OUTPUT

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster ${{ steps.ecs.outputs.cluster }} \
            --service ${{ steps.ecs.outputs.service }} \
            --force-new-deployment \
            --no-cli-pager
